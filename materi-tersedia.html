    <script>
        (function () {
            'use strict';

            // --- SUPABASE CONFIG ---
            const SB_URL = 'https://idwrkzekykarxnuoaysu.supabase.co';
            const SB_KEY = 'sb_publishable_N96gYsm_jeSntalN3qMVCA_TpXloD4u';
            const sbClient = supabase.createClient(SB_URL, SB_KEY);

            // --- GLOBAL STATE ---
            let allCourses = [];
            let currentUser = null;
            let isLoggedIn = false;

            // --- DOM REFS ---
            const grid = document.getElementById('course-grid');
            const emptyState = document.getElementById('empty-state');
            const programFilter = document.getElementById('programFilter');
            const subFilter = document.getElementById('subFilter');
            const searchInput = document.getElementById('searchInput');

            const debugInfo = document.getElementById('debug-info');

            // --- MODAL REFS ---
            const loginModal = document.getElementById('loginModal');
            const loginModalOverlay = document.getElementById('loginModalOverlay');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const switchToRegister = document.getElementById('switchToRegister');
            const switchToLogin = document.getElementById('switchToLogin');
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            const loginEmail = document.getElementById('loginEmail');
            const loginPass = document.getElementById('loginPass');
            const regName = document.getElementById('regName');
            const regEmail = document.getElementById('regEmail');
            const regWA = document.getElementById('regWA');
            const regProgram = document.getElementById('regProgram');
            const regPass = document.getElementById('regPass');
            const regConfirm = document.getElementById('regConfirm');

            // --- SESSION CHECK ---
            async function checkSession() {
                const { data: { session }, error } = await sbClient.auth.getSession();
                if (error) {
                    console.warn('Session error:', error);
                    currentUser = null;
                    isLoggedIn = false;
                    return false;
                }
                if (session) {
                    currentUser = session.user;
                    isLoggedIn = true;
                    return true;
                } else {
                    currentUser = null;
                    isLoggedIn = false;
                    return false;
                }
            }

            // --- LOGIN / REGISTER ---
            async function handleLogin(e) {
                e.preventDefault();
                const email = loginEmail.value.trim();
                const password = loginPass.value;
                if (!email || !password) {
                    alert('Isi email dan password');
                    return;
                }
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span>Memproses...</span><i class="fas fa-spinner fa-spin"></i>';

                const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>Login</span><i class="fas fa-sign-in-alt"></i>';

                if (error) {
                    alert('Login gagal: ' + error.message);
                    return;
                }
                await checkSession();
                closeLoginModal();
                await loadDataAndRender();
            }

            async function handleRegister(e) {
                e.preventDefault();
                const name = regName.value.trim();
                const email = regEmail.value.trim();
                const wa = regWA.value.trim();
                const program = regProgram.value;
                const password = regPass.value;
                const confirm = regConfirm.value;

                if (!name || !email || !wa || !program || !password || !confirm) {
                    alert('Semua kolom harus diisi');
                    return;
                }
                if (password.length < 6) {
                    alert('Password minimal 6 karakter');
                    return;
                }
                if (password !== confirm) {
                    alert('Password tidak cocok');
                    return;
                }

                registerBtn.disabled = true;
                registerBtn.innerHTML = '<span>Memproses...</span><i class="fas fa-spinner fa-spin"></i>';

                const { data, error } = await sbClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: name,
                            whatsapp: wa,
                            interest_program: program,
                        },
                    },
                });
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<span>Daftar</span><i class="fas fa-user-plus"></i>';

                if (error) {
                    alert('Daftar gagal: ' + error.message);
                    return;
                }

                if (data.user) {
                    await sbClient.from('profiles').upsert({
                        id: data.user.id,
                        full_name: name,
                        email,
                        whatsapp: wa,
                        interest_program: program,
                    });
                }

                alert('Pendaftaran berhasil! Silakan login.');
                showLoginTab();
            }

            // --- MODAL ---
            function openLoginModal() {
                loginModal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                showLoginTab();
            }

            function closeLoginModal() {
                loginModal.classList.add('hidden');
                document.body.style.overflow = '';
            }

            function showLoginTab() {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.className = 'flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm transition';
                tabRegister.className = 'flex-1 py-2 text-sm font-bold rounded-lg transition text-gray-500';
            }

            function showRegisterTab() {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabRegister.className = 'flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm transition';
                tabLogin.className = 'flex-1 py-2 text-sm font-bold rounded-lg transition text-gray-500';
            }

            // --- PASSWORD TOGGLE ---
            function initPasswordToggles() {
                document.querySelectorAll('.pwd-wrapper').forEach(wrapper => {
                    const toggle = wrapper.querySelector('.pwd-toggle');
                    const input = wrapper.querySelector('input');
                    if (!toggle || !input) return;

                    function updateVisibility() {
                        if (input.value.length > 0) {
                            toggle.classList.add('visible');
                        } else {
                            toggle.classList.remove('visible');
                            if (input.type === 'text') {
                                input.type = 'password';
                                const icon = toggle.querySelector('i');
                                if (icon) icon.className = 'fa-regular fa-eye';
                            }
                        }
                    }

                    input.addEventListener('input', updateVisibility);
                    input.addEventListener('change', updateVisibility);
                    toggle.addEventListener('click', function (e) {
                        e.preventDefault();
                        const icon = this.querySelector('i');
                        if (input.type === 'password') {
                            input.type = 'text';
                            if (icon) icon.className = 'fa-regular fa-eye-slash';
                        } else {
                            input.type = 'password';
                            if (icon) icon.className = 'fa-regular fa-eye';
                        }
                        input.focus();
                        updateVisibility();
                    });
                    updateVisibility();
                });
            }

            // --- FETCH DATA FROM MATERI.HTML ---
            async function fetchCourseData() {
                try {
                    console.log('🔍 Fetching materi.html...');
                    const response = await fetch('materi.html');
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const html = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');

                    const cards = doc.querySelectorAll('.course-card');
                    console.log(`📦 Ditemukan ${cards.length} course cards.`);
                    const courses = [];

                    cards.forEach((card, index) => {
                        const id = card.getAttribute('data-id') || '';
                        const category = card.getAttribute('data-category') || '';
                        const subfilter = card.getAttribute('data-subfilter') || '';
                        const review = card.getAttribute('data-review') || '';

                        const img = card.querySelector('img');
                        const image = img ? img.getAttribute('src') : '';

                        const titleEl = card.querySelector('h3');
                        const title = titleEl ? titleEl.textContent.trim() : '';

                        const infoItems = card.querySelectorAll('.flex-col.gap-0\\.5 .flex.items-center');
                        let pengajar = '';
                        let sesi = '';
                        infoItems.forEach((item, idx) => {
                            const span = item.querySelector('span');
                            if (span) {
                                const text = span.textContent.trim();
                                if (idx === 0) pengajar = text;
                                else if (idx === 1) sesi = text;
                            }
                        });

                        const priceSpan = card.querySelector('.text-primary.font-bold.text-base');
                        const price = priceSpan ? priceSpan.textContent.trim() : '';

                        const aksesBtn = card.querySelector('a[class*="bg-primary"]');
                        let aksesUrl = '#';
                        if (aksesBtn) {
                            const href = aksesBtn.getAttribute('href');
                            if (href && href !== '#' && href !== 'javascript:void(0)' && !href.startsWith('javascript:')) {
                                aksesUrl = href;
                            } else {
                                const onclick = aksesBtn.getAttribute('onclick');
                                if (onclick) {
                                    const match = onclick.match(/handleDaftar\s*\(\s*event\s*,\s*['"]([^'"]+)['"]\s*\)/);
                                    if (match && match[1] && match[1] !== '#') {
                                        aksesUrl = match[1];
                                    }
                                }
                            }
                        }

                        const available = aksesUrl && aksesUrl !== '#' && aksesUrl !== '';

                        const badgeEl = card.querySelector('.absolute.top-2.left-2');
                        const badge = badgeEl ? badgeEl.textContent.trim() : '';

                        courses.push({
                            id,
                            category,
                            subfilter,
                            review,
                            image,
                            title,
                            pengajar,
                            sesi,
                            price,
                            aksesUrl,
                            available,
                            badge,
                        });

                        if (index < 3) {
                            console.log(`   Card ${index + 1}: "${title}" => aksesUrl: "${aksesUrl}" (available: ${available})`);
                        }
                    });

                    const availableCourses = courses.filter(c => c.available);
                    console.log(`✅ Total cards: ${courses.length}, Tersedia: ${availableCourses.length}`);
                    if (availableCourses.length > 0) {
                        console.log('📋 Daftar materi tersedia:');
                        availableCourses.forEach(c => console.log(`   - ${c.title} (${c.category} / ${c.subfilter}) => ${c.aksesUrl}`));
                    } else {
                        console.warn('⚠️ Tidak ada materi yang tersedia. Pastikan ada link akses yang valid di materi.html.');
                    }

                    return courses;
                } catch (err) {
                    console.error('❌ Error fetching materi.html:', err);
                    return [];
                }
            }

            // --- RENDER ---
            function renderCards(courses) {
                grid.innerHTML = '';
                if (courses.length === 0) {
                    emptyState.classList.remove('hidden');
                    resultCount.textContent = '0 materi';
                    return;
                }
                emptyState.classList.add('hidden');
                resultCount.textContent = courses.length + ' materi';

                courses.forEach(course => {
                    const card = document.createElement('div');
                    card.className =
                        'course-card card-hover bg-white rounded-2xl overflow-hidden border border-gray-100 flex flex-col h-full fade-in';
                    card.setAttribute('data-id', course.id);
                    card.setAttribute('data-category', course.category);
                    card.setAttribute('data-subfilter', course.subfilter);
                    if (course.review) card.setAttribute('data-review', course.review);

                    card.innerHTML = `
                        <div class="relative overflow-hidden group aspect-[4/3]">
                            <img src="${course.image || 'https://userkv.r2.mayar.id/landing-page/assets/nuqthah-kind-kingdom-2402/d50a2464_fdggdd.png'}"
                                 alt="${course.title}"
                                 class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"
                                 loading="lazy"
                            />
                            <div class="absolute top-2 left-2 z-20 bg-white/90 backdrop-blur-sm text-primary px-2 py-0.5 rounded-full text-[10px] font-bold shadow-sm uppercase">
                                ${course.badge || course.subfilter || ''}
                            </div>
                            <button onclick="saveToMaterimu('${course.id}')"
                                    class="absolute top-2 right-2 z-20 w-8 h-8 bg-white text-primary rounded-md flex items-center justify-center shadow-md hover:bg-gray-100 transition-colors font-bold text-lg">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="text-sm font-bold text-gray-800 leading-tight mb-2 card-title-min-h">${course.title}</h3>
                            <div class="flex flex-col gap-0.5 mb-3 text-[10px] text-gray-600">
                                <div class="flex items-center">
                                    <i class="fas fa-user-tie mr-2 text-accent w-3 text-center"></i>
                                    <span>${course.pengajar || 'Asatidzah Nuqthah'}</span>
                                </div>
                                <div class="flex items-center">
                                    <i class="far fa-calendar-check mr-2 text-primary w-3 text-center"></i>
                                    <span>${course.sesi || '12 Sesi'}</span>
                                </div>
                            </div>
                            <div class="mt-auto">
                                <div class="flex flex-col mb-2">
                                    <span class="text-primary font-bold text-base">${course.price || 'Rp 100.000'}</span>
                                    <span class="text-[8px] text-gray-400 uppercase tracking-wider font-semibold">Pembayaran via Mayar</span>
                                </div>
                                <a href="#" onclick="handleDaftar(event, '${course.aksesUrl}')"
                                   class="w-full py-2 bg-primary hover:bg-opacity-90 text-white text-[11px] font-bold rounded-lg transition-all flex items-center justify-center gap-1">
                                    Akses <i class="fas fa-arrow-right text-[8px]"></i>
                                </a>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // --- FILTER ---
            function applyFilters() {
                const prog = programFilter.value;
                const sub = subFilter.value;
                const query = searchInput.value.toLowerCase().trim();

                const filtered = allCourses.filter(c => {
                    if (!c.available) return false;
                    if (prog !== 'all' && c.category !== prog) return false;
                    if (sub !== 'all' && c.subfilter !== sub) return false;
                    if (query && !c.title.toLowerCase().includes(query) &&
                        !c.category.toLowerCase().includes(query) &&
                        !c.subfilter.toLowerCase().includes(query)) return false;
                    return true;
                });
                renderCards(filtered);
                updateSubFilterOptions();
            }

            function updateProgramOptions() {
                const available = allCourses.filter(c => c.available);
                const categories = [...new Set(available.map(c => c.category))].sort();
                programFilter.innerHTML = '<option value="all">Semua Program</option>';
                categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                    programFilter.appendChild(opt);
                });
                subFilter.innerHTML = '<option value="all">Semua Sub</option>';
            }

            function updateSubFilterOptions() {
                const selectedProgram = programFilter.value;
                const available = allCourses.filter(c => c.available);
                let subs = [];
                if (selectedProgram === 'all') {
                    subs = [...new Set(available.map(c => c.subfilter))].sort();
                } else {
                    subs = [...new Set(available.filter(c => c.category === selectedProgram).map(c => c.subfilter))].sort();
                }
                subFilter.innerHTML = '<option value="all">Semua Sub</option>';
                subs.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s || 'Tanpa Sub';
                    subFilter.appendChild(opt);
                });
            }

            // --- HANDLE DAFTAR (BARU) - REDIRECT KE CHECKOUT.HTML ---
            window.handleDaftar = function (e, url) {
                if (e) e.preventDefault();

                if (!url || url === '#' || url === '' || url === 'javascript:void(0)') {
                    alert('Materi ini belum tersedia untuk akses langsung.');
                    return;
                }

                const card = e ? e.target.closest('.course-card') : null;
                let courseId = card ? card.getAttribute('data-id') : '';
                let reviewUrl = card ? card.getAttribute('data-review') : '';

                const params = new URLSearchParams();
                params.set('checkout', url); // TANPA encodeURIComponent
                if (courseId) params.set('course', courseId);
                if (reviewUrl && reviewUrl !== '#' && reviewUrl !== '') params.set('review', reviewUrl);
                params.set('from', 'materi-tersedia');

                const checkoutUrl = 'checkout.html?' + params.toString();
                window.location.href = checkoutUrl;
            };

            // --- SAVE TO MATERIMU ---
            window.saveToMaterimu = async function (courseId) {
                const { data: { user }, error } = await sbClient.auth.getUser();
                if (error || !user) {
                    alert('Silakan login terlebih dahulu.');
                    openLoginModal();
                    return;
                }

                const course = allCourses.find(c => c.id === courseId);
                if (!course) {
                    alert('Data materi tidak ditemukan.');
                    return;
                }

                const { data: existing, error: checkErr } = await sbClient
                    .from('saved_materials')
                    .select('id')
                    .eq('user_id', user.id)
                    .eq('course_id', courseId)
                    .maybeSingle();

                if (existing) {
                    alert('Materi sudah ada di daftar Materimu.');
                    return;
                }

                const insertData = {
                    user_id: user.id,
                    course_id: courseId,
                    title: course.title,
                    link: course.aksesUrl || '#',
                    image: course.image || null,
                };

                const { error: insertErr } = await sbClient
                    .from('saved_materials')
                    .insert(insertData);

                if (insertErr) {
                    alert('Gagal menyimpan: ' + insertErr.message);
                } else {
                    alert('Materi berhasil disimpan ke Materimu!');
                    const channel = new BroadcastChannel('nuqthah_sync');
                    channel.postMessage({ type: 'MATERIMU_ITEM_ADDED', item: insertData });
                }
            };

            // --- LOAD DATA ---
            async function loadDataAndRender() {
                const loggedIn = await checkSession();
                if (!loggedIn) {
                    openLoginModal();
                    grid.innerHTML = '';
                    emptyState.classList.add('hidden');
                    resultCount.textContent = '0 materi';
                    debugInfo.classList.remove('hidden');
                    debugInfo.innerHTML = `<span class="error">⚠️ Silakan login untuk melihat materi tersedia.</span>`;
                    return;
                }

                const courses = await fetchCourseData();
                allCourses = courses;
                const available = courses.filter(c => c.available);

                debugInfo.classList.remove('hidden');
                if (available.length === 0) {
                    debugInfo.innerHTML = `
                        <span class="error">⚠️ Tidak ada materi tersedia.</span>
                        Pastikan ada link akses yang valid di <strong>materi.html</strong> (bukan <code>#</code>).
                        <br><small>Total course cards: ${courses.length} | Tersedia: ${available.length}</small>
                    `;
                } else {
                    debugInfo.innerHTML = `
                        <span class="success">✅ ${available.length} materi tersedia</span>
                        dari total ${courses.length} course cards.
                        <br><small>Kategori: ${[...new Set(available.map(c => c.category))].join(', ')}</small>
                    `;
                }

                updateProgramOptions();
                updateSubFilterOptions();
                renderCards(available);
                programFilter.value = 'all';
                subFilter.value = 'all';
                searchInput.value = '';
            }

            // --- INIT ---
            document.addEventListener('DOMContentLoaded', function () {
                initPasswordToggles();

                loginForm.addEventListener('submit', handleLogin);
                registerForm.addEventListener('submit', handleRegister);
                tabLogin.addEventListener('click', showLoginTab);
                tabRegister.addEventListener('click', showRegisterTab);
                switchToRegister.addEventListener('click', showRegisterTab);
                switchToLogin.addEventListener('click', showLoginTab);
                loginModalOverlay.addEventListener('click', function (e) {
                    if (e.target === loginModalOverlay) closeLoginModal();
                });

                programFilter.addEventListener('change', applyFilters);
                subFilter.addEventListener('change', applyFilters);
                searchInput.addEventListener('input', applyFilters);

                loadDataAndRender();

                sbClient.auth.onAuthStateChange(async (event, session) => {
                    if (event === 'SIGNED_IN') {
                        currentUser = session?.user || null;
                        isLoggedIn = !!currentUser;
                        closeLoginModal();
                        await loadDataAndRender();
                    } else if (event === 'SIGNED_OUT') {
                        currentUser = null;
                        isLoggedIn = false;
                        grid.innerHTML = '';
                        emptyState.classList.add('hidden');
                        resultCount.textContent = '0 materi';
                        openLoginModal();
                        debugInfo.classList.remove('hidden');
                        debugInfo.innerHTML = `<span class="error">⚠️ Anda telah logout.</span>`;
                    }
                });

                const channel = new BroadcastChannel('nuqthah_sync');
                channel.addEventListener('message', async (e) => {
                    // tidak perlu reload
                });
            });

        })();
    </script>

</body>
